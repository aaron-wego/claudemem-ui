<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claudemem manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --orange-light: #fff7ed;
      --orange-border: #fed7aa;
      --red: #ef4444;
      --red-light: #fef2f2;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { font-family: var(--font); background: var(--gray-50); color: var(--gray-900); }

    /* Top bar */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: #fff; border-bottom: 1px solid var(--gray-200);
      padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .topbar h1 { font-size: 16px; font-weight: 700; color: var(--orange); margin-right: 8px; }
    .topbar select, .topbar input[type="date"] {
      border: 1px solid var(--gray-200); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; color: var(--gray-700);
      background: #fff; cursor: pointer;
    }
    .topbar select:focus, .topbar input[type="date"]:focus { outline: 2px solid var(--orange); outline-offset: -1px; }
    .topbar label { font-size: 12px; color: var(--gray-500); display: flex; align-items: center; gap: 6px; }

    /* Buttons */
    .btn { border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-danger:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
    .btn-outline { background: #fff; color: var(--gray-700); border: 1px solid var(--gray-200); }
    .btn-outline:hover { background: var(--gray-50); }

    /* Action bar */
    .action-bar {
      display: none; background: var(--orange-light); border-bottom: 1px solid var(--orange-border);
      padding: 10px 24px; align-items: center; gap: 12px;
    }
    .action-bar.visible { display: flex; }
    .action-bar span { font-size: 13px; color: var(--gray-700); }

    /* Main content */
    .main { max-width: 860px; margin: 0 auto; padding: 24px; }

    /* Observation cards */
    .card {
      background: #fff; border: 1px solid var(--gray-200); border-radius: 8px;
      padding: 16px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.15s;
    }
    .card.selected { border-color: var(--orange); background: var(--orange-light); }
    .card input[type="checkbox"] { margin-top: 2px; accent-color: var(--orange); flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; }
    .card-body { flex: 1; min-width: 0; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 4px; background: var(--gray-100); color: var(--gray-700);
    }
    .badge-discovery { background: #dbeafe; color: #1d4ed8; }
    .badge-feature    { background: #dcfce7; color: #16a34a; }
    .badge-change     { background: #fef9c3; color: #a16207; }
    .badge-decision   { background: #f3e8ff; color: #7e22ce; }
    .card-project { font-size: 12px; color: var(--gray-500); }
    .card-title { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-bottom: 3px; }
    .card-subtitle { font-size: 13px; color: var(--gray-500); line-height: 1.4; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .card-date { font-size: 11px; color: var(--gray-400); }
    .card-actions { display: flex; gap: 6px; align-items: center; }

    /* Inline delete confirmation */
    .inline-confirm { display: flex; align-items: center; gap: 8px; }
    .inline-confirm span { font-size: 12px; color: var(--gray-700); }
    .btn-icon {
      background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px;
      color: var(--gray-400); display: flex; align-items: center;
    }
    .btn-icon:hover { color: var(--red); background: var(--red-light); }

    /* Load more */
    .load-more { text-align: center; padding: 16px 0; }
    .empty-state { text-align: center; padding: 60px 0; color: var(--gray-400); font-size: 14px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #fff; border-radius: 10px; padding: 24px; max-width: 440px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h3 { font-size: 16px; margin-bottom: 10px; }
    .modal p  { font-size: 13px; color: var(--gray-500); margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <h1>claudemem manager</h1>
    <select id="project-filter">
      <option value="">All Projects</option>
    </select>
    <label>From <input type="date" id="date-from"></label>
    <label>To <input type="date" id="date-to"></label>
    <button class="btn btn-danger" id="btn-delete-range" disabled>Delete range</button>
  </div>

  <!-- Action bar (shown when items are selected) -->
  <div class="action-bar" id="action-bar">
    <span id="selection-count">0 selected</span>
    <button class="btn btn-danger" id="btn-delete-selected">Delete selected</button>
    <button class="btn btn-outline" id="btn-clear-selection">Clear</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="observation-list"></div>
    <div class="load-more" id="load-more-container" style="display:none">
      <button class="btn btn-outline" id="btn-load-more">Load more</button>
    </div>
  </div>

  <!-- Confirmation modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 id="modal-title">Confirm deletion</h3>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="modal-cancel">Cancel</button>
        <button class="btn btn-danger" id="modal-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────────
    const state = {
      project: "",
      from: "",
      to: "",
      offset: 0,
      total: 0,
      selectedIds: new Set(),
    };
    const LIMIT = 50;

    // ── API helpers ───────────────────────────────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(path, options);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error ?? "Request failed");
      }
      return res.json();
    }

    // ── Projects dropdown ────────────────────────────────────────────────────────
    async function loadProjects() {
      const projects = await apiFetch("/api/projects");
      const select = document.getElementById("project-filter");
      projects.forEach(({ project, count }) => {
        const opt = document.createElement("option");
        opt.value = project;
        opt.textContent = `${project} (${count})`;
        select.appendChild(opt);
      });
    }

    // ── Observation card rendering ───────────────────────────────────────────────
    function badgeClass(type) {
      return `badge badge-${(type ?? "").toLowerCase()}`;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString();
    }

    function renderCard(obs) {
      const card = document.createElement("div");
      card.className = "card" + (state.selectedIds.has(obs.id) ? " selected" : "");
      card.dataset.id = obs.id;
      card.innerHTML = `
        <input type="checkbox" class="card-checkbox" ${state.selectedIds.has(obs.id) ? "checked" : ""}>
        <div class="card-body">
          <div class="card-meta">
            <span class="${badgeClass(obs.type)}">${obs.type ?? ""}</span>
            <span class="card-project">${obs.project}</span>
          </div>
          <div class="card-title">${obs.title ?? "(no title)"}</div>
          ${obs.subtitle ? `<div class="card-subtitle">${obs.subtitle}</div>` : ""}
          <div class="card-footer">
            <span class="card-date">#${obs.id} · ${formatDate(obs.created_at)}</span>
            <div class="card-actions">
              <div class="inline-confirm" id="confirm-${obs.id}" style="display:none">
                <span>Delete this observation?</span>
                <button class="btn btn-danger btn" style="font-size:12px;padding:4px 10px" onclick="confirmSingleDelete(${obs.id})">Confirm</button>
                <button class="btn btn-outline btn" style="font-size:12px;padding:4px 10px" onclick="cancelSingleDelete(${obs.id})">Cancel</button>
              </div>
              <button class="btn-icon" title="Delete" onclick="startSingleDelete(${obs.id})">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      `;
      card.querySelector(".card-checkbox").addEventListener("change", e => toggleSelection(obs.id, e.target.checked));
      return card;
    }

    // ── Load observations ────────────────────────────────────────────────────────
    async function loadObservations(append = false) {
      const params = new URLSearchParams({ limit: LIMIT, offset: state.offset });
      if (state.project) params.set("project", state.project);
      if (state.from)    params.set("from",    state.from);
      if (state.to)      params.set("to",      state.to);

      const data = await apiFetch(`/api/observations?${params}`);
      state.total = data.total;

      const list = document.getElementById("observation-list");
      if (!append) list.innerHTML = "";

      if (data.items.length === 0 && !append) {
        list.innerHTML = `<div class="empty-state">No observations found.</div>`;
      } else {
        data.items.forEach(obs => list.appendChild(renderCard(obs)));
      }

      const lmc = document.getElementById("load-more-container");
      lmc.style.display = data.hasMore ? "block" : "none";

      updateRangeDeleteButton();
    }

    // ── Filter event handlers ────────────────────────────────────────────────────
    function updateRangeDeleteButton() {
      const btn = document.getElementById("btn-delete-range");
      btn.disabled = !(state.project && state.from && state.to);
    }

    async function applyFilters() {
      state.offset = 0;
      state.selectedIds.clear();
      updateSelectionUI();
      await loadObservations(false);
    }

    document.getElementById("project-filter").addEventListener("change", e => {
      state.project = e.target.value;
      applyFilters();
    });
    document.getElementById("date-from").addEventListener("change", e => {
      state.from = e.target.value;
      applyFilters();
    });
    document.getElementById("date-to").addEventListener("change", e => {
      state.to = e.target.value;
      applyFilters();
    });

    document.getElementById("btn-load-more").addEventListener("click", async () => {
      state.offset += LIMIT;
      await loadObservations(true);
    });

    // ── Single delete ────────────────────────────────────────────────────────────
    function startSingleDelete(id) {
      document.getElementById(`confirm-${id}`).style.display = "flex";
    }

    function cancelSingleDelete(id) {
      document.getElementById(`confirm-${id}`).style.display = "none";
    }

    async function confirmSingleDelete(id) {
      await apiFetch(`/api/observations/${id}`, { method: "DELETE" });
      document.querySelector(`.card[data-id="${id}"]`).remove();
      state.selectedIds.delete(id);
      state.total--;
      updateSelectionUI();
      if (document.querySelectorAll(".card").length === 0) {
        document.getElementById("observation-list").innerHTML =
          `<div class="empty-state">No observations found.</div>`;
      }
    }

    // ── Selection ────────────────────────────────────────────────────────────────
    function toggleSelection(id, checked) {
      if (checked) state.selectedIds.add(id);
      else state.selectedIds.delete(id);
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if (card) card.classList.toggle("selected", checked);
      updateSelectionUI();
    }

    function updateSelectionUI() {
      const n = state.selectedIds.size;
      const bar = document.getElementById("action-bar");
      bar.classList.toggle("visible", n > 0);
      document.getElementById("selection-count").textContent = `${n} selected`;
      document.getElementById("btn-delete-selected").textContent = `Delete selected (${n})`;
    }

    document.getElementById("btn-clear-selection").addEventListener("click", () => {
      state.selectedIds.clear();
      document.querySelectorAll(".card.selected").forEach(c => {
        c.classList.remove("selected");
        c.querySelector(".card-checkbox").checked = false;
      });
      updateSelectionUI();
    });

    // ── Modal helpers ─────────────────────────────────────────────────────────────
    function showModal(title, body, onConfirm) {
      document.getElementById("modal-title").textContent = title;
      document.getElementById("modal-body").textContent = body;
      document.getElementById("modal-overlay").classList.add("visible");
      document.getElementById("modal-confirm").onclick = async () => {
        hideModal();
        await onConfirm();
      };
    }

    function hideModal() {
      document.getElementById("modal-overlay").classList.remove("visible");
    }

    document.getElementById("modal-cancel").addEventListener("click", hideModal);
    document.getElementById("modal-overlay").addEventListener("click", e => {
      if (e.target === e.currentTarget) hideModal();
    });

    // ── Bulk delete (selection) ───────────────────────────────────────────────────
    document.getElementById("btn-delete-selected").addEventListener("click", () => {
      const n = state.selectedIds.size;
      showModal(
        "Delete observations",
        `Delete ${n} observation${n === 1 ? "" : "s"}? This cannot be undone.`,
        async () => {
          const ids = [...state.selectedIds];
          await apiFetch("/api/observations/bulk", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ids }),
          });
          state.selectedIds.clear();
          state.offset = 0;
          updateSelectionUI();
          await loadObservations(false);
        }
      );
    });

    // ── Date range delete ─────────────────────────────────────────────────────────
    document.getElementById("btn-delete-range").addEventListener("click", () => {
      const { project, from, to, total } = state;
      showModal(
        "Delete by date range",
        `Delete ${total} observation${total === 1 ? "" : "s"} from "${project}" between ${from} and ${to}? A backup of your database will be created first.`,
        async () => {
          await apiFetch("/api/observations/range", {
            method: "DELETE",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ project, from, to }),
          });
          state.offset = 0;
          state.selectedIds.clear();
          updateSelectionUI();
          await loadObservations(false);
        }
      );
    });

    // ── Init ─────────────────────────────────────────────────────────────────────
    (async () => {
      await loadProjects();
      state.offset = 0;
      await loadObservations();
    })();
  </script>
</body>
</html>
