<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claudemem manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f97316;
      --orange-light: #fff7ed;
      --orange-border: #fed7aa;
      --red: #ef4444;
      --red-light: #fef2f2;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { font-family: var(--font); background: var(--gray-50); color: var(--gray-900); }

    /* Top bar */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: #fff; border-bottom: 1px solid var(--gray-200);
      padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .topbar h1 { font-size: 16px; font-weight: 700; color: var(--orange); margin-right: 8px; }
    .topbar select, .topbar input[type="date"] {
      border: 1px solid var(--gray-200); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; color: var(--gray-700);
      background: #fff; cursor: pointer;
    }
    .topbar select:focus, .topbar input[type="date"]:focus { outline: 2px solid var(--orange); outline-offset: -1px; }
    .topbar label { font-size: 12px; color: var(--gray-500); display: flex; align-items: center; gap: 6px; }

    /* Buttons */
    .btn { border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-danger:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
    .btn-outline { background: #fff; color: var(--gray-700); border: 1px solid var(--gray-200); }
    .btn-outline:hover { background: var(--gray-50); }

    /* Action bar */
    .action-bar {
      display: none; background: var(--orange-light); border-bottom: 1px solid var(--orange-border);
      padding: 10px 24px; align-items: center; gap: 12px;
    }
    .action-bar.visible { display: flex; }
    .action-bar span { font-size: 13px; color: var(--gray-700); }

    /* Main content */
    .main { max-width: 860px; margin: 0 auto; padding: 24px; }

    /* Observation cards */
    .card {
      background: #fff; border: 1px solid var(--gray-200); border-radius: 8px;
      padding: 16px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 12px;
      transition: border-color 0.15s;
    }
    .card.selected { border-color: var(--orange); background: var(--orange-light); }
    .card input[type="checkbox"] { margin-top: 2px; accent-color: var(--orange); flex-shrink: 0; width: 15px; height: 15px; cursor: pointer; }
    .card-body { flex: 1; min-width: 0; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 4px; background: var(--gray-100); color: var(--gray-700);
    }
    .badge-discovery { background: #dbeafe; color: #1d4ed8; }
    .badge-feature    { background: #dcfce7; color: #16a34a; }
    .badge-change     { background: #fef9c3; color: #a16207; }
    .badge-decision   { background: #f3e8ff; color: #7e22ce; }
    .card-project { font-size: 12px; color: var(--gray-500); }
    .card-title { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-bottom: 3px; }
    .card-subtitle { font-size: 13px; color: var(--gray-500); line-height: 1.4; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .card-date { font-size: 11px; color: var(--gray-400); }
    .card-actions { display: flex; gap: 6px; align-items: center; }

    /* Inline delete confirmation */
    .inline-confirm { display: flex; align-items: center; gap: 8px; }
    .inline-confirm span { font-size: 12px; color: var(--gray-700); }
    .btn-icon {
      background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px;
      color: var(--gray-400); display: flex; align-items: center;
    }
    .btn-icon:hover { color: var(--red); background: var(--red-light); }

    /* Load more */
    .load-more { text-align: center; padding: 16px 0; }
    .empty-state { text-align: center; padding: 60px 0; color: var(--gray-400); font-size: 14px; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #fff; border-radius: 10px; padding: 24px; max-width: 440px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h3 { font-size: 16px; margin-bottom: 10px; }
    .modal p  { font-size: 13px; color: var(--gray-500); margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <h1>claudemem manager</h1>
    <select id="project-filter">
      <option value="">All Projects</option>
    </select>
    <label>From <input type="date" id="date-from"></label>
    <label>To <input type="date" id="date-to"></label>
    <button class="btn btn-danger" id="btn-delete-range" disabled>Delete range</button>
  </div>

  <!-- Action bar (shown when items are selected) -->
  <div class="action-bar" id="action-bar">
    <span id="selection-count">0 selected</span>
    <button class="btn btn-danger" id="btn-delete-selected">Delete selected</button>
    <button class="btn btn-outline" id="btn-clear-selection">Clear</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="observation-list"></div>
    <div class="load-more" id="load-more-container" style="display:none">
      <button class="btn btn-outline" id="btn-load-more">Load more</button>
    </div>
  </div>

  <!-- Confirmation modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 id="modal-title">Confirm deletion</h3>
      <p id="modal-body"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" id="modal-cancel">Cancel</button>
        <button class="btn btn-danger" id="modal-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // JS added in subsequent tasks
  </script>
</body>
</html>
